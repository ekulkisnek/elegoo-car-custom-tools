; Open this folder in Cursor → PlatformIO picks up this file.
; Serial Monitor: bottom PIO toolbar (plug) or Command Palette → "PlatformIO: Serial Monitor"
; First build may download the espressif32 platform (one-time).

[platformio]
src_dir = .

[env:esp32-s3-elegoo]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.flash_size = 8MB
board_build.psram = opi
board_upload.flash_size = 8MB

; USB serial to host (matches ELEGOO Notes / Arduino "USB CDC On Boot: Enabled")
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_LED_ILLUMINATOR_ENABLED=0

; Partition table: board default; override if upload size errors (e.g. huge_app.csv)

lib_deps =
